limit_req_zone $binary_remote_addr zone=baileys_api:10m rate=10r/s;

# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name yolopment.cloud www.yolopment.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS Server block
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name yolopment.cloud www.yolopment.cloud;

    ssl_certificate /etc/ssl/certs/yolopment.cloud.pem;
    ssl_certificate_key /etc/ssl/private/yolopment.cloud.key;

    # Basic SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 26M;

    location / {
        limit_req zone=baileys_api burst=30 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
    }
}
