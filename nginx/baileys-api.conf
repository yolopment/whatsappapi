limit_req_zone $binary_remote_addr zone=baileys_api:10m rate=10r/s;

# default_server makes the API reachable on the bare VPS IP too.
# Remove "default_server" if another site on this box already claims it.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.example.com;

    client_max_body_size 26M;

    location / {
        limit_req zone=baileys_api burst=30 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 35s;
        proxy_read_timeout 35s;
    }
}
